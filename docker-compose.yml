# FastBlog Docker Compose Configuration
# Usage: docker-compose up -d

version: '3.8'

services:
  # ============================================================================
  # FastBlog Backend (FastAPI)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastblog-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-9421}:9421"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-fastblog_secret}
      - DB_NAME=${DB_NAME:-fast_blog}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
      - DEBUG=False
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9421/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # Frontend (Astro)
  # ============================================================================
  frontend:
    build:
      context: ./frontend-astro
      dockerfile: Dockerfile
    container_name: fastblog-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      - PUBLIC_API_URL=http://backend:9421
    depends_on:
      - backend
    networks:
      - fastblog-network

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fastblog-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fastblog_secret}
      POSTGRES_DB: ${DB_NAME:-fast_blog}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: fastblog-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Nginx Reverse Proxy (Production)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: fastblog-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fastblog-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  fastblog-network:
    driver: bridge
