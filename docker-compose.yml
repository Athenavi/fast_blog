# FastBlog Docker Compose Configuration
# Usage: docker-compose up -d

services:
  # ============================================================================
  # FastBlog Backend (FastAPI)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      additional_contexts:
        ffmpeg_src: ./tools/ffmpeg
    container_name: fastblog-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-9421}:9421"
    environment:
      # --- 数据库配置（Docker 内部网络，host 使用服务名） ---
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-fastblog_secret}
      - DB_NAME=${DB_NAME:-fast_blog}
      # --- Redis 配置 ---
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # --- 应用配置 ---
      - SECRET_KEY=${SECRET_KEY:-}
      - ENVIRONMENT=production
      - DEBUG=False
    # 注意：不设置 user，Dockerfile 无 USER 指令，默认 root
    # entrypoint 以 root 运行初始化后，通过 gosu 降权到 appuser
    volumes:
      # 所有可写目录使用命名卷 — 从镜像继承 appuser:appuser 权限，无权限问题
      - fastblog-media:/app/media
      - fastblog-uploads:/app/uploads
      - fastblog-logs:/app/logs
      - fastblog-backups:/app/backups
      - fastblog-config:/app/config
      - fastblog-storage:/app/storage
      - fastblog-plugins-data:/app/plugins_data
      - fastblog-static-generated:/app/static_generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9421/api/v2/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # Frontend (Astro static files + Nginx reverse proxy — unified)
  # ============================================================================
  # This container serves both the frontend static files AND reverse-proxies
  # API/media requests to the backend, replacing the standalone nginx container.
  frontend:
    build:
      context: ./frontend-astro
      dockerfile: Dockerfile
    container_name: fastblog-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:80"
    depends_on:
      - backend
    networks:
      - fastblog-network

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fastblog-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fastblog_secret}
      POSTGRES_DB: ${DB_NAME:-fast_blog}
    volumes:
      - fastblog-postgres:/var/lib/postgresql/data
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: fastblog-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - fastblog-redis:/data
    networks:
      - fastblog-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# Volumes (named volumes — Docker manages ownership, no permission issues)
# ============================================================================
volumes:
  fastblog-postgres:
    driver: local
  fastblog-redis:
    driver: local
  fastblog-media:
    driver: local
  fastblog-uploads:
    driver: local
  fastblog-logs:
    driver: local
  fastblog-backups:
    driver: local
  fastblog-config:
    driver: local
  fastblog-storage:
    driver: local
  fastblog-plugins-data:
    driver: local
  fastblog-static-generated:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  fastblog-network:
    driver: bridge
