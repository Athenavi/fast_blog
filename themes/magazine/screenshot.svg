<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Breaking News Bar -->
  <rect x="0" y="0" width="800" height="40" fill="#dc2626"/>
  <text x="20" y="27" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">BREAKING NEWS</text>
  <text x="180" y="27" font-family="Arial, sans-serif" font-size="14" fill="white">Latest updates from around the world...</text>
  
  <!-- Header -->
  <rect x="0" y="40" width="800" height="80" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="36" fill="#111827" text-anchor="middle" font-weight="900">MAGAZINE</text>
  
  <!-- Featured Posts Grid -->
  <!-- Large featured post (left) -->
  <rect x="50" y="140" width="460" height="280" rx="8" fill="#f3f4f6"/>
  <rect x="50" y="340" width="460" height="80" fill="#111827" opacity="0.8"/>
  <rect x="70" y="360" width="300" height="16" rx="4" fill="white"/>
  <rect x="70" y="385" width="250" height="10" rx="2" fill="#d1d5db"/>
  
  <!-- Small featured posts (right) -->
  <rect x="530" y="140" width="220" height="130" rx="8" fill="#f3f4f6"/>
  <rect x="530" y="240" width="220" height="30" fill="#111827" opacity="0.8"/>
  <rect x="545" y="250" width="150" height="10" rx="2" fill="white"/>
  
  <rect x="530" y="290" width="220" height="130" rx="8" fill="#f3f4f6"/>
  <rect x="530" y="390" width="220" height="30" fill="#111827" opacity="0.8"/>
  <rect x="545" y="400" width="150" height="10" rx="2" fill="white"/>
  
  <!-- Category Section -->
  <rect x="50" y="440" width="200" height="3" fill="#dc2626"/>
  <text x="50" y="465" font-family="Arial, sans-serif" font-size="20" fill="#dc2626" font-weight="bold">TECHNOLOGY</text>
  
  <!-- Article Grid -->
  <rect x="50" y="480" width="220" height="100" rx="4" fill="#f3f4f6"/>
  <rect x="290" y="480" width="220" height="100" rx="4" fill="#f3f4f6"/>
  <rect x="530" y="480" width="220" height="100" rx="4" fill="#f3f4f6"/>
</svg>
