# Label configuration for actions/labeler
# https://github.com/actions/labeler

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend-astro/**'
          - 'frontend-next/**'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'
          - 'apps/**'
          - 'main.py'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose*.yml'
          - '.dockerignore'
          - 'nginx/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'requirements.txt'
          - 'package.json'
          - 'package-lock.json'
          - 'pyproject.toml'

plugins:
  - changed-files:
      - any-glob-to-any-file:
          - 'plugins/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - '**/test_*.py'

config:
  - changed-files:
      - any-glob-to-any-file:
          - 'config/**'
          - '.env*'
          - 'alembic.ini'

shared:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/**'

database:
  - changed-files:
      - any-glob-to-any-file:
          - 'alembic_migrations/**'
          - 'shared/models/**'
