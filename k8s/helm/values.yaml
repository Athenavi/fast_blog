# Default values for FastBlog
replicaCount: 1

image:
  repository: fastblog/fastblog
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations: { }
podSecurityContext: { }
securityContext: { }

service:
  type: ClusterIP
  port: 9421

ingress:
  enabled: false
  className: ""
  annotations: { }
  hosts:
    - host: fastblog.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: [ ]

resources:
  limits:
    cpu: 4
    memory: 4Gi
  requests:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: { }
tolerations: [ ]
affinity: { }

# PostgreSQL配置
postgresql:
  enabled: true
  auth:
    postgresPassword: "fastblog_password"
    database: "fastblog"
    username: "postgres"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 512Mi

# Redis配置
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 1
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 128Mi

# Meilisearch配置
meilisearch:
  enabled: true
  masterKey: "fastblog_master_key"
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# 应用配置
config:
  secretKey: "change-this-to-random-secret-key"
  debug: false
  backupRetentionDays: 30
  
  # OAuth配置（可选）
  oauth:
    googleClientId: ""
    googleClientSecret: ""
    githubClientId: ""
    githubClientSecret: ""
  
  # LDAP配置（可选）
  ldap:
    server: ""
    port: 389
    baseDN: ""
    bindDN: ""
    bindPassword: ""
