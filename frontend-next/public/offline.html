<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>离线 - FastBlog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 16px;
        }

        p {
            color: #4a5568;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .tips {
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .tips h3 {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            color: #4a5568;
            font-size: 14px;
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }

        .tips li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #48bb78;
            font-weight: bold;
        }

        .retry-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .retry-button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .offline-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
<div class="offline-container">
    <div class="icon">📡</div>
    <h1>您已离线</h1>
    <p>看起来您的网络连接出现了问题。别担心，您可以稍后重试。</p>

    <div class="tips">
        <h3>您可以尝试：</h3>
        <ul>
            <li>检查网络连接设置</li>
            <li>切换到其他网络（WiFi/移动数据）</li>
            <li>查看之前缓存的文章</li>
            <li>刷新页面重新连接</li>
        </ul>
    </div>

    <button class="retry-button" onclick="window.location.reload()">
        重试
    </button>
</div>

<script>
    // 监听在线/离线状态
    window.addEventListener('online', () => {
        console.log('网络已连接');
        // 自动刷新页面
        setTimeout(() => {
            window.location.reload();
        }, 1000);
    });

    window.addEventListener('offline', () => {
        console.log('网络已断开');
    });

    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
                console.log('[PWA] Service Worker 注册成功:', registration.scope);
            })
            .catch((error) => {
                console.error('[PWA] Service Worker 注册失败:', error);
            });
    }
</script>
</body>
</html>
