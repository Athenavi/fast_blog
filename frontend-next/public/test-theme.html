<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>主题测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .test-box {
            background-color: white;
            border: 2px solid #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .dark .test-box {
            background-color: #111827;
            border-color: #374151;
            color: white;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
    </style>
</head>
<body>
<h1>主题切换测试</h1>

<div class="test-box">
    <h2>测试框</h2>
    <p>这个框应该在深色模式下变成深色背景</p>
    <p>当前 HTML 元素的 class: <span id="html-class"></span></p>
</div>

<button onclick="toggleTheme()">切换主题</button>
<button onclick="checkTheme()">检查主题状态</button>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
        updateDisplay();
    }

    function checkTheme() {
        updateDisplay();
        alert('HTML class: ' + document.documentElement.classList.toString() + '\nlocalStorage theme: ' + localStorage.getItem('theme'));
    }

    function updateDisplay() {
        document.getElementById('html-class').textContent = document.documentElement.classList.toString() || '(空)';
    }

    // 初始化
    window.addEventListener('load', () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        }
        updateDisplay();
    });
</script>
</body>
</html>
