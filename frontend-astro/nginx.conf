# ============================================================================
# FastBlog Unified Nginx Configuration
# ============================================================================
# Serves frontend static files AND reverse-proxies API requests to backend.
# This replaces both the old frontend-only nginx and the standalone nginx
# reverse proxy container, eliminating one container and one network hop.
# ============================================================================

upstream backend {
    server backend:9421;
    keepalive 32;
}

# Rate limiting zones (must be at http/server level, conf.d is inside http block)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ========================================================================
    # Security headers
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================================================
    # Gzip compression
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Serve pre-compressed files if available (Astro can generate .gz/.br files)
    gzip_static on;

    # ========================================================================
    # Client settings
    # ========================================================================
    client_max_body_size 60M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ========================================================================
    # API reverse proxy to backend
    # NOTE: Use ^~ prefix for API/media locations to prevent regex locations
    #       (e.g. \.js$) from intercepting API requests.
    # ========================================================================

    # Auth endpoints (stricter rate limiting — must match before general /api/)
    location ^~ /api/v1/auth/ {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Swagger/API docs
    location ^~ /api/v2/docs {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v2/redoc {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v2/openapi.json {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Backend static files (with long cache)
    location ^~ /api/v2/static/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    # Backend assets storage (with long cache)
    location ^~ /api/v2/assets/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    # General API endpoints (catch-all for /api/)
    location ^~ /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Media files (backend storage)
    location ^~ /media/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Sitemap (proxied to backend for dynamic generation)
    location = /sitemap.xml {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check endpoint (proxied to backend)
    location = /health {
        access_log off;
        proxy_pass http://backend/api/v2/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========================================================================
    # Frontend static files (served directly from local filesystem)
    # ========================================================================

    # Hashed assets (JS/CSS/fonts with content hash in filename) — cache forever
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Service worker — no cache
    location = /sw.js {
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # PWA manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Main location — try static files, then .html extension, fallback to 404
    location / {
        limit_req zone=general burst=100 nodelay;
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

