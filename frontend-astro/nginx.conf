# Frontend Nginx Configuration for serving Astro static files
# Optimized for performance and security
# Note: Security headers are handled by the outer nginx reverse proxy (fastblog.conf)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Serve pre-compressed files if available (Astro can generate .gz/.br files)
    gzip_static on;

    # Hashed assets (JS/CSS/images with content hash in filename) - cache forever
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images - cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Service worker - no cache
    location = /sw.js {
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # PWA manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";
    }

    # Main location - try static files, then .html extension, fallback to 404
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
