models:
  AuditLog:
    description: 操作审计日志模型
    status: active
    frontend_page: /admin/audit-logs
    properties:
      id:
        type: bigint
        description: 日志 ID
      user_id:
        type: bigint
        nullable: true
        description: 操作用户 ID
        foreignKey: User
      user_name:
        type: string
        nullable: true
        maxLength: 100
        description: 操作用户名称
      level:
        type: string
        maxLength: 20
        default: info
        description: 日志级别 (info/warning/error/critical)
      description:
        type: text
        nullable: true
        description: 日志详细描述
      action:
        type: string
        maxLength: 100
        description: '操作动作 (如: create_article, update_settings)'
      resource_type:
        type: string
        maxLength: 50
        nullable: true
        description: '资源类型 (如: Article, User)'
      resource_id:
        type: bigint
        nullable: true
        description: 资源 ID
      ip_address:
        type: string
        maxLength: 45
        nullable: true
        description: 操作 IP 地址
      user_agent:
        type: text
        nullable: true
        description: 用户代理字符串
      request_data:
        type: text
        nullable: true
        description: 请求数据快照 (JSON)
      status:
        type: string
        maxLength: 20
        default: success
        description: 操作状态 (success, failure)
      error_message:
        type: text
        nullable: true
        description: 错误信息
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: system
    orm: true
    table: audit_logs
    indexes:
      - name: idx_audit_logs_user_id
        columns:
          - user_id
        comment: 用户操作查询索引
      - name: idx_audit_logs_action
        columns:
          - action
        comment: 动作类型查询索引
      - name: idx_audit_logs_created_at
        columns:
          - created_at
        order: DESC
        comment: 时间排序索引
      - name: idx_audit_logs_resource
        columns:
          - resource_type
          - resource_id
        comment: 资源操作追踪索引
  AIWorkflow:
    description: AI 智能工作流记录模型
    status: active
    frontend_page: /admin/ai
    properties:
      id:
        type: bigint
        description: 工作流 ID
      user_id:
        type: bigint
        description: 用户 ID
        foreignKey: User
      task_type:
        type: string
        maxLength: 50
        description: 任务类型 (writing_assist, seo_optimize, tag_recommend)
      input_data:
        type: text
        description: 输入数据 (JSON)
      output_data:
        type: text
        nullable: true
        description: 输出结果 (JSON)
      model_used:
        type: string
        maxLength: 100
        nullable: true
        description: 使用的 AI 模型
      tokens_used:
        type: integer
        default: 0
        description: 消耗的 Token 数量
      status:
        type: string
        maxLength: 20
        default: pending
        description: 状态 (pending, processing, completed, failed)
      error_message:
        type: text
        nullable: true
        description: 错误信息
      created_at:
        type: string
        format: date-time
        description: 创建时间
      completed_at:
        type: string
        format: date-time
        nullable: true
        description: 完成时间
    module: ai
    orm: true
    table: ai_workflows
    indexes:
      - name: idx_ai_workflows_user_id
        columns:
          - user_id
        comment: 用户工作流查询索引
      - name: idx_ai_workflows_task_type
        columns:
          - task_type
        comment: 任务类型索引
      - name: idx_ai_workflows_status
        columns:
          - status
        comment: 状态索引
  PageBuilder:
    description: 可视化页面构建器模型
    status: active
    frontend_page: /admin/page-builder
    properties:
      id:
        type: bigint
        description: 页面 ID
      title:
        type: string
        maxLength: 255
        description: 页面标题
      slug:
        type: string
        maxLength: 255
        unique: true
        description: 页面路径标识
      blocks_data:
        type: text
        description: 页面块数据 (JSON 格式存储拖拽布局)
      template_name:
        type: string
        maxLength: 100
        nullable: true
        description: 关联的主题模板名称
      is_published:
        type: boolean
        default: false
        description: 是否发布
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: page
    orm: true
    table: page_builder
    indexes:
      - name: idx_page_builder_slug
        columns:
          - slug
        unique: true
        comment: 页面Slug唯一索引
  GlobalStyle:
    description: 全局样式配置模型
    status: active
    frontend_page: /admin/theme-marketplace
    properties:
      id:
        type: bigint
        description: 配置 ID
      theme_name:
        type: string
        maxLength: 100
        unique: true
        description: 主题/方案名称
      variables_json:
        type: text
        description: CSS 变量 JSON (colors, fonts, spacing)
      is_active:
        type: boolean
        default: false
        description: 是否当前激活
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: theme
    orm: true
    table: global_styles
  FieldPermission:
    description: 字段级权限控制模型
    status: active
    frontend_page: /admin/user-security
    properties:
      id:
        type: bigint
        description: 权限 ID
      role_id:
        type: bigint
        foreignKey: Role
        description: 角色 ID
      model_name:
        type: string
        maxLength: 100
        description: 模型名称
      field_name:
        type: string
        maxLength: 100
        description: 字段名称
      can_read:
        type: boolean
        default: true
        description: 是否可读
      can_write:
        type: boolean
        default: false
        description: 是否可写
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: security
    orm: true
    table: field_permissions
  User:
    description: 用户模型
    status: active
    frontend_page: /admin/users
    properties:
      id:
        type: bigint
        description: 用户 ID
      username:
        type: string
        description: 用户名
        unique: true
        maxLength: 255
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        maxLength: 255
        description: 密码（哈希后存储）
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      profile_private:
        type: boolean
        default: false
        description: 是否私密资料
      vip_level:
        type: bigint
        default: 0
        description: VIP 等级
      vip_expires_at:
        type: string
        format: date-time
        nullable: true
        description: VIP 过期时间
      is_active:
        type: boolean
        default: true
        description: 是否激活
      is_superuser:
        type: boolean
        default: false
        description: 是否为超级管理员
      date_joined:
        type: string
        format: date-time
        description: 注册时间
      last_login_at:
        type: string
        format: date-time
        nullable: true
        description: 上次登录时间
      locale:
        type: string
        default: zh_CN
        description: 语言设置
      is_staff:
        type: boolean
        default: false
        description: 是否为工作人员
      last_login_ip:
        type: string
        nullable: true
        description: 上次登录 IP
      register_ip:
        type: string
        nullable: true
        description: 注册 IP
      is_2fa_enabled:
        type: boolean
        default: false
        description: 是否启用双因素认证
      totp_secret:
        type: string
        nullable: true
        maxLength: 32
        description: TOTP 密钥
      backup_codes:
        type: text
        nullable: true
        description: 备用码(JSON格式存储)
    module: user
    orm: true
    table: users
    indexes:
      - name: idx_users_username
        columns:
          - username
        unique: true
        comment: 用户名唯一索引
      - name: idx_users_email
        columns:
          - email
        unique: true
        comment: 邮箱唯一索引
      - name: idx_users_is_active
        columns:
          - is_active
        comment: 激活状态索引
      - name: idx_users_vip_level
        columns:
          - vip_level
        comment: VIP等级索引
      - name: idx_users_date_joined
        columns:
          - date_joined
        order: DESC
        comment: 注册时间索引
      - name: idx_users_is_superuser
        columns:
          - is_superuser
        comment: 超级管理员索引
      - name: idx_users_last_login
        columns:
          - last_login_at
        order: DESC
        comment: 最后登录时间索引
    def_list:
      - is_vip
      - get_display_name
    defs_target: mydef.py
    relationships:
      roles:
        target: Role
        secondary: user_role_assignments
        back_populates: users
  UserCreate:
    type: schema
    description: 用户创建请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        minLength: 6
        writeOnly: true
        description: 密码
      password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认密码
    required:
      - username
      - password
      - password_confirm
  UserUpdate:
    type: schema
    description: 用户更新请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      locale:
        type: string
        default: zh_CN
        description: 语言设置
      profile_private:
        type: boolean
        default: false
        description: 是否私密资料
  ProfileUpdateRequest:
    type: schema
    description: 用户资料更新请求
    properties:
      username:
        type: string
        nullable: true
        description: 用户名
      email:
        type: string
        nullable: true
        format: email
        description: 邮箱
      bio:
        type: string
        nullable: true
        description: 个人简介
      profile_private:
        type: boolean
        nullable: true
        description: 是否私密资料
      locale:
        type: string
        nullable: true
        description: 语言设置
  PasswordChange:
    type: schema
    description: 密码修改请求模型
    properties:
      old_password:
        type: string
        writeOnly: true
        description: 当前密码
      new_password:
        type: string
        minLength: 6
        writeOnly: true
        description: 新密码
      new_password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认新密码
    required:
      - old_password
      - new_password
      - new_password_confirm
  Article:
    description: 文章模型
    status: active
    frontend_page: /admin/articles
    properties:
      id:
        type: bigint
        description: 文章 ID
      title:
        type: string
        maxLength: 255
        description: 标题
      slug:
        type: string
        maxLength: 255
        description: 文章 slug
      excerpt:
        type: string
        nullable: true
        description: 摘要
      cover_image:
        type: string
        nullable: true
        description: 封面图 URL
      category:
        type: bigint
        nullable: true
        description: 分类
        foreignKey: Category
      tags_list:
        type: array
        items:
          type: string
        description: 标签列表
      views:
        type: bigint
        default: 0
        description: 浏览量
      user:
        type: bigint
        description: 用户
        foreignKey: User
      likes:
        type: bigint
        default: 0
        description: 点赞数
      status:
        type: integer
        enum:
          - -1
          - 0
          - 1
        description: 状态 (-1:已删除，0:草稿，1:已发布)
      hidden:
        type: boolean
        default: false
        description: 是否隐藏
      is_featured:
        type: boolean
        default: false
        description: 是否推荐
      is_vip_only:
        type: boolean
        default: false
        description: 是否仅 VIP 可见
      required_vip_level:
        type: integer
        default: 0
        description: 所需 VIP 等级
      article_ad:
        type: string
        nullable: true
        description: 广告内容
      scheduled_publish_at:
        type: string
        format: date-time
        nullable: true
        description: 定时发布时间（设置为未来时间后自动发布）
      published_at:
        type: string
        format: date-time
        nullable: true
        description: 实际发布时间
        index: true
      post_type:
        type: string
        maxLength: 50
        default: article
        description: 内容类型(article/book/product等)
        index: true
      is_sticky:
        type: boolean
        default: false
        description: 是否置顶（粘性文章）
        index: true
      sticky_until:
        type: string
        format: date-time
        nullable: true
        description: 置顶过期时间（可选，过期后自动取消置顶）
      sort_order:
        type: bigint
        default: 0
        description: 排序顺序（用于拖拽排序）
        index: true
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    table: articles
    indexes:
      - name: idx_articles_status
        columns:
          - status
      - name: idx_articles_category
        columns:
          - category
      - name: idx_articles_user_id
        columns:
          - user
      - name: idx_articles_created_at
        columns:
          - created_at
        order: DESC
      - name: idx_articles_scheduled_publish
        columns:
          - scheduled_publish_at
      - name: idx_articles_status_created
        columns:
          - status
          - created_at
        order: DESC
      - name: idx_articles_is_sticky
        columns:
          - is_sticky
      - name: idx_articles_sticky_until
        columns:
          - sticky_until
      - name: idx_articles_published_at
        columns:
          - created_at
        order: DESC
        comment: 文章发布时间索引（用于最新文章查询）
      - name: idx_articles_status_featured
        columns:
          - status
          - is_featured
        comment: 推荐文章查询索引
      - name: idx_articles_status_views
        columns:
          - status
          - views
        order: DESC
        comment: 热门文章查询索引
      - name: idx_articles_slug
        columns:
          - slug
        unique: true
        comment: 文章slug唯一索引
      - name: idx_articles_post_type_status
        columns:
          - post_type
          - status
        comment: 按类型和状态查询索引
      - name: idx_articles_category_status_created
        columns:
          - category
          - status
          - created_at
        order: DESC
        comment: 分类文章列表查询索引
      - name: idx_articles_user_status_created
        columns:
          - user
          - status
          - created_at
        order: DESC
        comment: 用户文章列表查询索引
    module: article
    orm: true
    relationships:
      revisions:
        target: ArticleRevision
        back_populates: article
        primaryjoin: Article.id == ArticleRevision.article_id
      seo_data:
        target: ArticleSEO
        back_populates: article
        primaryjoin: Article.id == ArticleSEO.article_id
        uselist: false
  ArticleList:
    type: schema
    description: 文章列表模型
    properties:
      id:
        type: bigint
        description: 文章 ID
      title:
        type: string
        maxLength: 255
        description: 标题
      slug:
        type: string
        maxLength: 255
        description: 文章 slug
      excerpt:
        type: string
        nullable: true
        description: 摘要
      cover_image:
        type: string
        nullable: true
        description: 封面图 URL
      category_id:
        type: bigint
        nullable: true
        description: 分类 ID
      tags_list:
        type: array
        items:
          type: string
        description: 标签列表
      views:
        type: bigint
        default: 0
        description: 浏览量
      likes:
        type: bigint
        default: 0
        description: 点赞数
      status:
        type: integer
        description: 状态
      is_featured:
        type: boolean
        default: false
        description: 是否推荐
      is_vip_only:
        type: boolean
        default: false
        description: 是否仅 VIP 可见
      required_vip_level:
        type: integer
        default: 0
        description: 所需 VIP 等级
      is_sticky:
        type: boolean
        default: false
        description: 是否置顶
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
  AuthorSimple:
    type: schema
    description: 作者简化信息
    properties:
      id:
        type: bigint
        description: 用户 ID
      username:
        type: string
        description: 用户名
  ArticleCreateUpdate:
    type: schema
    description: 文章创建/更新请求模型
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 255
        description: 标题
      slug:
        type: string
        maxLength: 255
        description: 文章 slug
      excerpt:
        type: string
        nullable: true
        description: 摘要
      cover_image:
        type: string
        nullable: true
        description: 封面图 URL
      category_id:
        type: bigint
        nullable: true
        description: 分类 ID
      tags:
        type: string
        nullable: true
        description: 标签 (逗号分隔)
      status:
        type: bigint
        enum:
          - -1
          - 0
          - 1
        default: 1
        description: 状态
      hidden:
        type: boolean
        default: false
        description: 是否隐藏
      is_featured:
        type: boolean
        default: false
        description: 是否推荐
      is_vip_only:
        type: boolean
        default: false
        description: 是否仅 VIP 可见
      required_vip_level:
        type: bigint
        default: 0
        description: 所需 VIP 等级
      article_ad:
        type: string
        nullable: true
        description: 广告内容
      scheduled_publish_at:
        type: string
        format: date-time
        nullable: true
        description: 定时发布时间
      is_sticky:
        type: boolean
        default: false
        description: 是否置顶
      sticky_until:
        type: string
        format: date-time
        nullable: true
        description: 置顶过期时间
    required:
      - title
  Category:
    description: 分类模型
    status: active
    frontend_page: /admin/categories
    properties:
      id:
        type: bigint
        description: 分类 ID
      name:
        type: string
        maxLength: 100
        description: 分类名
      slug:
        type: string
        nullable: true
        description: 分类 slug
      description:
        type: string
        nullable: true
        description: 分类描述
      parent_id:
        type: bigint
        nullable: true
        description: 父分类 ID
      sort_order:
        type: bigint
        default: 0
        description: 排序
      icon:
        type: string
        nullable: true
        description: 图标
      color:
        type: string
        nullable: true
        description: 颜色
      is_visible:
        type: boolean
        default: true
        description: 是否可见
      articles_count:
        type: bigint
        readOnly: true
        description: 分类下的文章数量
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: category
    orm: true
    table: categories
    indexes:
      - name: idx_categories_slug
        columns:
          - slug
        unique: true
        comment: 分类slug唯一索引
      - name: idx_categories_parent
        columns:
          - parent_id
        comment: 父分类索引（用于层级查询）
      - name: idx_categories_sort_order
        columns:
          - sort_order
        comment: 排序索引
      - name: idx_categories_is_visible
        columns:
          - is_visible
        comment: 可见性索引
  CategoryCreateUpdate:
    type: schema
    description: 分类创建/更新请求模型
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        description: 分类名
      slug:
        type: string
        nullable: true
        description: 分类 slug
      description:
        type: string
        nullable: true
        description: 分类描述
      parent_id:
        type: bigint
        nullable: true
        description: 父分类 ID
      sort_order:
        type: bigint
        default: 0
        description: 排序
      icon:
        type: string
        nullable: true
        description: 图标
      color:
        type: string
        nullable: true
        description: 颜色
      is_visible:
        type: boolean
        default: true
        description: 是否可见
    required:
      - name
  CategorySubscription:
    description: 分类订阅模型
    status: active
    frontend_page: /admin/categories
    properties:
      id:
        type: bigint
        description: 订阅 ID
      category:
        type: bigint
        description: 分类
        foreignKey: Category
      subscriber:
        type: bigint
        description: 订阅用户
        foreignKey: User
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: category
    orm: true
    table: category_subscriptions
  Media:
    description: 媒体文件模型
    status: active
    frontend_page: /admin/media
    properties:
      id:
        type: bigint
        description: 媒体 ID
      user:
        type: bigint
        description: 上传用户
        foreignKey: User
      hash:
        type: string
        maxLength: 64
        description: 文件哈希
      filename:
