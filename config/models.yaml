# ============================================================================
# FastBlog 模型定义配置文件
# ============================================================================
#
# 本文件用于定义项目中所有的 SQLAlchemy 数据模型和 Pydantic 请求/响应模型。
# 代码生成器会根据此配置文件自动生成：
#   - SQLAlchemy ORM 模型 (shared/models/*.py)
#   - FastAPI 路由 (src/api/v1/generated/generated_router.py)
#   - TypeScript 类型定义 (frontend-next/types/generated/api-types.ts)
#   - TypeScript API 客户端 (frontend-next/types/generated/api-client.ts)
#
# 使用方法：
#   1. 在此文件中添加或修改模型定义
#   2. 运行命令: python scripts/generate_routes.py generate-all
#   3. 生成的代码会自动保存到对应目录
#
# 模型配置说明：
#   - orm: true          # 标记为 ORM 模型，会生成 SQLAlchemy 模型文件
#   - table: xxx         # 指定数据库表名
#   - def_list: [...]    # 自定义方法列表（在 shared/defs/<model>_defs.py 中定义）
#   - defs_target: xxx   # 自定义方法文件名（相对于 shared/defs/）
#   - properties:        # 模型属性定义
#       field_name:
#         type: string   # 数据类型 (string, integer, boolean, text, datetime等)
#         description:   # 字段描述
#         maxLength:     # 最大长度（字符串类型）
#         nullable:      # 是否可为空
#         default:       # 默认值
#         unique:        # 是否唯一
#         foreignKey:    # 外键引用（引用其他模型的名称）
#         enum: []       # 枚举值列表
#         format:        # 格式（如 email, date-time）
#         index: true    # 是否创建索引
#
# 注意事项：
#   - 请勿手动修改自动生成的模型文件（文件头部有注释标识）
#   - 自定义方法应放在 shared/defs/ 目录下的对应文件中
#   - 修改配置后需要重新运行代码生成器
#   - 数据库迁移需要单独执行（使用 Alembic 或 Django migrations）
#
# ============================================================================

models:
  User:
    description: 用户模型
    properties:
      id:
        type: bigint
        description: 用户 ID
      username:
        type: string
        description: 用户名
        unique: true
        maxLength: 255
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        maxLength: 255
        description: 密码（哈希后存储）
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      profile_private:
        type: boolean
        default: false
        description: 是否私密资料
      vip_level:
        type: bigint
        default: 0
        description: VIP 等级
      vip_expires_at:
        type: string
        format: date-time
        nullable: true
        description: VIP 过期时间
      is_active:
        type: boolean
        default: true
        description: 是否激活
      is_superuser:
        type: boolean
        default: false
        description: 是否为超级管理员
      date_joined:
        type: string
        format: date-time
        description: 注册时间
      last_login_at:
        type: string
        format: date-time
        nullable: true
        description: 上次登录时间
      locale:
        type: string
        default: zh_CN
        description: 语言设置
      is_staff:
        type: boolean
        default: false
        description: 是否为工作人员
      last_login_ip:
        type: string
        nullable: true
        description: 上次登录 IP
      register_ip:
        type: string
        nullable: true
        description: 注册 IP
      is_2fa_enabled:
        type: boolean
        default: false
        description: 是否启用双因素认证
      totp_secret:
        type: string
        nullable: true
        description: TOTP 密钥
      backup_codes:
        type: string
        nullable: true
        description: 备用码
    orm: true
    table: users
    # 自定义方法列表（函数名定义在 shared/defs/<model_name>_defs.py 中）
    # 提示：自定义方法中请使用内部导入（如 from datetime import datetime），避免外部依赖
    def_list:
      - is_vip
      - get_display_name
    # 自定义方法定义文件路径（相对于 shared/defs/），默认：<model_name>_defs.py
    defs_target: mydef.py
  UserCreate:
    description: 用户创建请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        minLength: 6
        writeOnly: true
        description: 密码
      password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认密码
    required:
      - username
      - password
      - password_confirm
  UserUpdate:
    description: 用户更新请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      locale:
        type: string
        default: zh_CN
        description: 语言设置
      profile_private:
        type: boolean
        default: false
        description: 是否私密资料
  ProfileUpdateRequest:
    description: 用户资料更新请求
    properties:
      username:
        type: string
        nullable: true
        description: 用户名
      email:
        type: string
        nullable: true
        format: email
        description: 邮箱
      bio:
        type: string
        nullable: true
        description: 个人简介
      profile_private:
        type: boolean
        nullable: true
        description: 是否私密资料
      locale:
        type: string
        nullable: true
        description: 语言设置
  PasswordChange:
    description: 密码修改请求模型
    properties:
      old_password:
        type: string
        writeOnly: true
        description: 当前密码
      new_password:
        type: string
        minLength: 6
        writeOnly: true
        description: 新密码
      new_password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认新密码
    required:
      - old_password
      - new_password
      - new_password_confirm
  Article:
    description: 文章模型
    properties:
      id:
        type: bigint
        description: 文章 ID
      title:
        type: string
        maxLength: 255
        description: 标题
      slug:
        type: string
        maxLength: 255
        description: 文章 slug
      excerpt:
        type: string
        nullable: true
        description: 摘要
      cover_image:
        type: string
        nullable: true
        description: 封面图 URL
      category:
        type: bigint
        nullable: true
        description: 分类
        foreignKey: Category
      tags_list:
        type: array
        items:
          type: string
        description: 标签列表
      views:
        type: bigint
        default: 0
        description: 浏览量
      user:
        type: bigint
        description: 用户
        foreignKey: User
      likes:
        type: bigint
        default: 0
        description: 点赞数
      status:
        type: integer
        enum:
          - -1
          - 0
          - 1
        description: 状态 (-1:已删除，0:草稿，1:已发布)
      hidden:
        type: boolean
        default: false
        description: 是否隐藏
      is_featured:
        type: boolean
        default: false
        description: 是否推荐
      is_vip_only:
        type: boolean
        default: false
        description: 是否仅 VIP 可见
      required_vip_level:
        type: integer
        default: 0
        description: 所需 VIP 等级
      article_ad:
        type: string
        nullable: true
        description: 广告内容
      scheduled_publish_at:
        type: string
        format: date-time
        nullable: true
        description: 定时发布时间（设置为未来时间后自动发布）
      post_type:
        type: string
        maxLength: 50
        default: article
        description: 内容类型(article/book/product等)
        index: true
      is_sticky:
        type: boolean
        default: false
        description: 是否置顶（粘性文章）
        index: true
      sticky_until:
        type: string
        format: date-time
        nullable: true
        description: 置顶过期时间（可选，过期后自动取消置顶）
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    table: articles
    indexes:
      - name: idx_articles_status
        columns: [ status ]
      - name: idx_articles_category
        columns: [ category ]
      - name: idx_articles_user_id
        columns: [ user ]
      - name: idx_articles_created_at
        columns: [ created_at ]
        order: DESC
      - name: idx_articles_scheduled_publish
        columns: [ scheduled_publish_at ]
      - name: idx_articles_status_created
        columns: [ status, created_at ]
        order: DESC
      - name: idx_articles_is_sticky
        columns: [ is_sticky ]
      - name: idx_articles_sticky_until
        columns: [ sticky_until ]
    orm: true
    relationships:
      revisions:
        target: ArticleRevision
        back_populates: article
        primaryjoin: "Article.id == ArticleRevision.article_id"
      seo_data:
        target: ArticleSEO
        back_populates: article
        primaryjoin: "Article.id == ArticleSEO.article_id"
        uselist: false
  ArticleList:
    description: 文章列表模型
    properties:
      id:
